<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Deliverer - Master License Mission</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&family=Gaegu:wght@700&display=swap');

        :root {
            --navy-deep: #020617;
            --navy-mid: #0f172a;
            --cyan: #00f7ff;
            --magenta: #ff2ef7;
            --yellow: #fff200;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--navy-deep); color: var(--white); font-family: 'Nanum Gothic', sans-serif; overflow: hidden; }

        .app-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 5px; }

        /* 상단 헤더 커스텀 */
        header { padding: 10px 0; text-align: center; position: relative; flex-shrink: 0; }
        .sub-header { font-family: 'Jua'; font-size: 0.9rem; color: var(--magenta); margin-bottom: 5px; display: flex; justify-content: center; align-items: center; gap: 5px; text-shadow: 0 0 10px var(--magenta); }
        header h1 { margin: 0; font-size: 2rem; font-family: 'Jua'; color: var(--cyan); letter-spacing: -1px; text-shadow: 0 0 15px var(--cyan); }
        
        .fullscreen-btn { position: absolute; right: 10px; top: 15px; background: var(--glass); border: 1px solid var(--cyan); color: var(--cyan); padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }
        
        nav { display: flex; justify-content: center; gap: 8px; flex-shrink: 0; margin-bottom: 5px; }
        .nav-btn { padding: 8px 12px; border: none; background: var(--glass); color: #aaa; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .nav-btn.active { background: #fff; color: var(--navy-deep); box-shadow: 0 0 15px #fff; }

        main { flex: 1; display: flex; flex-direction: column; padding: 5px 15px; min-height: 0; position: relative; }
        .tab-content { display: none; width: 100%; height: 100%; flex-direction: column; }
        .tab-content.active { display: flex; }

        .manual-container {
            flex: 1; background: var(--navy-mid); border: 3px solid var(--cyan); border-radius: 30px;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 247, 255, 0.1);
        }

        .manual-header { padding: 12px 25px; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .manual-title { font-family: 'Jua'; font-size: 1.3rem; color: var(--yellow); }
        .page-indicator { font-family: 'Jua'; color: var(--cyan); font-size: 1.1rem; }

        .manual-content { flex: 1; display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; padding: 15px; align-items: stretch; min-height: 0; }
        .visual-area { background: #000; border-radius: 20px; border: 2px solid var(--glass); position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }

        .text-area { display: flex; flex-direction: column; justify-content: center; gap: 10px; overflow-y: auto; }
        .chapter-label { font-family: 'Jua'; color: var(--magenta); font-size: 1.3rem; margin-bottom: 5px; }
        .main-text { font-family: 'Nanum Gothic'; font-size: 1.15rem; line-height: 1.7; color: #eee; }
        .main-text b { color: var(--cyan); }
        
        .nyang-tip { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 15px; border-left: 5px solid var(--yellow); font-family: 'Jua'; font-size: 0.95rem; line-height: 1.4; }

        .quiz-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .opt-btn { background: var(--glass); border: 2px solid var(--cyan); color: white; padding: 12px 5px; border-radius: 10px; cursor: pointer; font-family: 'Jua'; font-size: 1rem; }

        .manual-footer { padding: 15px 20px 20px; border-top: 1px solid var(--glass); display: flex; justify-content: center; gap: 15px; flex-shrink: 0; }
        .nav-control-btn { padding: 8px 15px; border-radius: 20px; border: none; font-family: 'Jua'; font-size: 0.9rem; cursor: pointer; min-width: 100px; }
        .btn-prev { background: #334155; color: #fff; }
        .btn-next { background: var(--cyan); color: var(--navy-deep); }
        .btn-back { background: #1e293b; color: #fff; }

        /* 네온 자격증 스타일 */
        .cert-neon-box {
            margin: auto; width: 95%; max-width: 550px; background: #000;
            border: 6px solid var(--yellow); border-radius: 25px; padding: 30px;
            text-align: center; box-shadow: 0 0 30px var(--yellow), inset 0 0 20px rgba(255,242,0,0.3);
            position: relative; overflow: hidden;
        }
        .cert-title { font-family: 'Gaegu'; font-size: 3rem; color: var(--yellow); text-shadow: 0 0 15px var(--yellow); margin-bottom: 20px; }
        .cert-info { font-family: 'Jua'; color: #fff; font-size: 1.2rem; line-height: 1.8; margin-bottom: 20px; }
        .cert-date { font-family: 'Nanum Gothic'; color: #94a3b8; font-size: 0.9rem; margin-top: 10px; }
        
        /* 냥디 애니메이션 */
        .nyang-celebrate { width: 100px; height: 100px; margin: 0 auto; animation: dance 1s infinite alternate; }
        @keyframes dance { from { transform: rotate(-10deg) scale(1); } to { transform: rotate(10deg) scale(1.2); } }

        #hint-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 400px; background: var(--navy-mid); border: 3px solid var(--yellow); border-radius: 20px; padding: 25px; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #cert-popup { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }

        @media (max-width: 768px) {
            .manual-content { grid-template-columns: 1fr; grid-template-rows: 0.7fr 1.3fr; }
            .quiz-options { grid-template-columns: repeat(3, 1fr); }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="app-container" id="main-app">
    <header>
        <div class="sub-header">🎶 나도 어디서 꿀리지 않아~ GD(Gravity Deliverer)! 🎶</div>
        <h1>Gravity Deliverer: 중력 택배 자격증 따기 미션</h1>
        <button class="fullscreen-btn" onclick="toggleFullScreen()">전체화면</button>
    </header>

   <nav>
    <button class="nav-btn" onclick="location.href='tab1.html'">🛸 신입 기사 훈련소</button>
    <button class="nav-btn" onclick="location.href='tab2.html'">🎬 GD’s Motion Lab</button>
    <button class="nav-btn" onclick="location.href='tab4.html'">📦 배송 미션</button>
    <button class="nav-btn active" id="nav-manual" onclick="showTab('manual')">📒 업무 매뉴얼</button>
    <button class="nav-btn" id="nav-cert" onclick="showTab('cert')" disabled>🪪 GD 자격증</button>
</nav>

    <main>
        <div id="tab-manual" class="tab-content active">
            <div class="manual-container">
                <div class="manual-header">
                    <div class="manual-title" id="mode-title">📜 냥디의 핵심 비법 노트</div>
                    <div class="page-indicator" id="page-idx">1 / 5</div>
                </div>
                <div class="manual-content">
                    <div class="visual-area"><canvas id="manualCanvas"></canvas></div>
                    <div class="text-area" id="text-box"></div>
                </div>
                <div class="manual-footer" id="footer-controls"></div>
            </div>
        </div>

        <div id="tab-cert" class="tab-content">
            <div class="cert-neon-box">
                <div class="cert-title">베테랑 중력 기사 합격증</div>
                <!-- 축하하는 냥디 SVG -->
                <svg class="nyang-celebrate" viewBox="0 0 100 100">
                    <circle cx="50" cy="55" r="30" fill="#fff" stroke="#ffd700" stroke-width="2"/>
                    <path d="M30 40 L20 15 L45 30 Z" fill="#fff" stroke="#ffd700"/>
                    <path d="M70 40 L80 15 L55 30 Z" fill="#fff" stroke="#ffd700"/>
                    <circle cx="40" cy="50" r="3" fill="#333"/>
                    <circle cx="60" cy="50" r="3" fill="#333"/>
                    <path d="M45 65 Q50 70 55 65" fill="none" stroke="#333" stroke-width="2"/>
                    <text x="50" y="95" text-anchor="middle" font-family="Jua" fill="var(--yellow)" font-size="12">냥디가 축하한다냥!</text>
                </svg>
                <div class="cert-info">
                    성명: 은하계 라이더 <br>
                    위 기사는 중력의 법칙을 완벽히 통달하고 <br>
                    우주 전역의 험난한 배송 환경 속에서도 <br>
                    안전한 임무 수행 능력을 갖추었음을 증명함.
                </div>
                <div style="color:var(--magenta); font-family:'Jua'; font-size:1.5rem; border:2.5px solid; display:inline-block; padding:10px 20px; transform:rotate(-5deg);">냥디 인증 합격</div>
                <div class="cert-date" id="current-date"></div>
            </div>
        </div>

        <div id="hint-modal">
            <div style="font-family:'Jua'; color:var(--yellow); font-size:1.5rem; margin-bottom:10px;">💡 냥디의 힌트냥!</div>
            <div style="font-size:1rem; line-height:1.5; color:#fff;" id="hint-text"></div>
            <button class="nav-control-btn btn-back" style="margin-top:15px; width:100%;" onclick="document.getElementById('hint-modal').style.display='none'">닫기</button>
        </div>

        <div id="cert-popup">
            <h1 style="color:var(--yellow); font-family:'Jua'; font-size:3.5rem; margin-bottom:20px;">자격증 해금! 🎉</h1>
            <p style="color:white; font-size:1.5rem; margin-bottom:30px;">축하한다냥! 너는 이제 베테랑 배송 기사다냥!</p>
            <button class="nav-control-btn btn-next" onclick="goToCert()">자격증 확인하러 가기 🪪</button>
        </div>
    </main>
</div>

<script>
    let isQuiz = false, currentPage = 1, currentQuiz = 0;
    const canvas = document.getElementById('manualCanvas'), ctx = canvas.getContext('2d');
    let animId = null, restartTimeout = null;

    const chapters = [
        { title: "제1장: 질량의 편견을 버려라냥!", content: `질량이 서로 다른 물체가 <b>진공</b>에서 떨어질 때 <br><b>같은 시간에 같은 높이로 동시에 떨어진다</b>는 것!`, tip: "🐱 진공 상태에선 공기 저항이 없다냥! 그래서 질량에 상관없이 중심의 높이가 항상 똑같이 떨어진다냥!", visual: "mass_vacuum" },
        { title: "제2장: 힘과 운동의 이중생활냥!", content: `자유낙하운동과 수평으로 던진 물체의 운동에서 <b>알짜힘은 중력</b>이고, 방향은 <b>연직 아래</b>이며, <b>가속도의 크기는 같다</b>는 것! <br><br> 연직으로는 <b>속력이 일정하게 증가</b>하지만, <br> 수평으로 던진 물체의 운동은 수평 방향으로 <b>등속 운동(속력 일정)</b>이다냥!`, tip: "🐱 옆으로 던져져도 아래로 당겨지는 중력은 자유낙하와 똑같다냥! 그래서 바닥에 동시에 닿는다냥!", visual: "dual_motion" },
        { title: "제3장: 속력이 거리의 전부일 때냥!", content: `수평으로 던진 물체의 운동에서 <b>같은 높이, 다른 속력</b>으로 던진 경우, <br> <b>수평 속력이 클수록 이동거리가 크다</b>는 점! <br><br> 이때, <b>수평도달거리는 수평 속력과 시간의 곱</b>으로 구한다냥!`, tip: "🐱 수평 속력이 빠를수록 택배가 더 멀리 날아간다냥! 수평 속력만 커졌을 뿐, 떨어지는 시간은 똑같으니까냥!", visual: "velocity_dist" },
        { title: "제4장: 높이가 시간을 만든다냥!", content: `<b>더 높은 곳</b>에서 떨어뜨리면, <br><b>낙하 시간이 길어지므로</b> 수평 이동 거리가 커진다는 점!`, tip: "🐱 높은 곳에서 던지면 바닥에 닿기까지 시간이 더 걸린다냥. 그동안 택배는 옆으로 더 많이 이동해서 멀리 도착한다냥!", visual: "height_time" },
        { title: "제5장: 행성마다 중력이 다르다냥!", content: `중력이 다른 행성에서 물체를 떨어뜨렸을 때, <b>같은 높이</b>이면, <br> <b>중력 가속도가 클수록 낙하 시간이 작아진다</b>는 점! <br> 그러면 <b>수평 이동 거리도 줄어든다</b>냥!`, tip: "🐱 중력이 강한 행성은 택배를 순식간에 땅으로 낚아챈다냥! 공중에 떠서 옆으로 갈 시간이 부족해서 멀리 못 간다냥!", visual: "gravity_planet" }
    ];

    const quizzes = [
        { 
            nyang: "첫 번째 관문이다냥! 공기 저항이 있을 때와 없을 때를 잘 구분해야 자격증을 딸 수 있다냥!",
            q: "그림 (가)와 (나)는 각각 공기와 진공에서 동일한 쇠구슬과 깃털을 같은 높이에서 가만히 놓아 낙하하는 모습이다. 옳은 설명은?",
            view: "ㄱ. (나)에서 쇠구슬의 속력은 일정하다.<br>ㄴ. 깃털에 작용하는 중력의 크기는 (가)에서와 (나)에서 같다.<br>ㄷ. 진공에선 무게 상관없이 동시에 바닥에 도달한다.",
            opts: ["① ㄱ", "② ㄷ", "③ ㄱ, ㄴ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"],
            ans: 4, hint: "공기 중(가)에서는 저항 때문에 가벼운 깃털이 늦게 떨어진다냥! 하지만 중력은 공기가 있든 없든 항상 작용한다냥!", visual: "quiz1"
        },
        { 
            nyang: "이미지 속 눈금을 잘 봐라냥! B가 0.1초 동안 가로로 몇 칸 갔는지 세어보면 속력을 알 수 있다냥!",
            q: "자유 낙하 A와 수평 방향 발사 B 실험이다. 옳은 것은? (격자 10cm, 0.1초 간격)",
            view: "ㄱ. 낙하하는 동안 B에 작용하는 힘의 방향은 연직 방향이다.<br>ㄴ. A는 B보다 먼저 수평면에 도달한다.<br>ㄷ. B의 수평 방향 속력은 1m/s이다.",
            opts: ["① ㄱ", "② ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"],
            ans: 3, hint: "0.1초 동안 가로로 1칸(10cm)을 갔다면, 1초 동안에는 100cm(1m)를 가는 거다냥!", visual: "quiz2"
        },
        { 
            nyang: "높이가 같으면 시간도 같다는 거, 가로 칸수가 속력이라는 거 잊지 마라냥!",
            q: "수평 방향으로 각각 v<sub>A</sub>, v<sub>B</sub>, v<sub>C</sub>의 속력으로 동시에 던진 A, B, C의 위치다. 옳은 것은?",
            view: "ㄱ. v<sub>A</sub> = v<sub>B</sub>이다.<br>ㄴ. 수평면에 A가 C보다 먼저 도달한다.<br>ㄷ. 도달 순간 수평 방향의 속력은 C가 B보다 작다.",
            opts: ["① ㄱ", "② ㄴ", "③ ㄷ", "④ ㄱ, ㄴ", "⑤ ㄱ, ㄷ"],
            ans: 1, hint: "A와 B는 가로 이동 거리가 눈금상으로 같다냥! 따라서 수평 속력도 같다냥!", visual: "quiz3"
        },
        { 
            nyang: "마지막 관문이다냥! 지구(가)와 행성 X(나)를 잘 비교해봐라냥!",
            q: "지구와 미지의 행성 X에서 운동하는 A와 B의 위치를 1초 간격으로 나타냈다. 옳은 것은?",
            view: "ㄱ. (가)에서 연직 방향 가속도의 크기는 A와 B가 같다.<br>ㄴ. 중력 가속도의 크기는 (가)에서가 (나)에서보다 크다.<br>ㄷ. B가 낙하하는 동안 B의 수평 방향 속력은 (가)와 (나)에서 같다.",
            opts: ["① ㄱ", "② ㄷ", "③ ㄱ, ㄴ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"],
            ans: 5, hint: "지구는 1초마다 눈금이 1-3-5로 확확 늘어나는데, X는 0.5-1.5-2.5로 천천히 늘어난다냥! 중력의 차이다냥!", visual: "quiz4"
        }
    ];

    function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

    function render() {
        stopAnim();
        const footer = document.getElementById('footer-controls');
        footer.innerHTML = '';

        if (!isQuiz) {
            const data = chapters[currentPage - 1];
            document.getElementById('mode-title').innerText = "📜 냥디의 핵심 비법 노트";
            document.getElementById('page-idx').innerText = `${currentPage} / 5`;
            document.getElementById('text-box').innerHTML = `<div class="chapter-label">${data.title}</div><div class="main-text">${data.content}</div><div class="nyang-tip">${data.tip}</div>`;
            footer.innerHTML = `<button class="nav-control-btn btn-prev" ${currentPage===1?'disabled':''} onclick="currentPage--;render()">이전 비법</button>${currentPage===5 ? '<button class="nav-control-btn btn-next" style="background:var(--magenta);color:#fff" onclick="isQuiz=true;currentQuiz=0;render()">자격 시험 치르기 ✍</button>' : '<button class="nav-control-btn btn-next" onclick="currentPage++;render()">다음 비법</button>'}`;
            startAnim(data.visual);
        } else {
            const q = quizzes[currentQuiz];
            document.getElementById('mode-title').innerText = "✍ 은하 배송 자격 시험";
            document.getElementById('page-idx').innerText = `STEP ${currentQuiz+1} / 4`;
            document.getElementById('text-box').innerHTML = `<div class="nyang-tip" style="margin-bottom:10px;">${q.nyang}</div><div class="main-text"><b>${q.q}</b></div><div class="main-text" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; font-size:0.95rem;">${q.view}</div><div class="quiz-options">${q.opts.map((o,i)=>`<button class="opt-btn" onclick="checkAnswer(${i+1})">${o}</button>`).join('')}</div>`;
            footer.innerHTML = `<button class="nav-control-btn btn-back" onclick="isQuiz=false;currentPage=1;render()">비법노트</button><button class="nav-control-btn btn-prev" ${currentQuiz===0?'disabled':''} onclick="currentQuiz--;render()">이전 문제</button><button class="nav-control-btn btn-hint" onclick="showHint()">💡 힌트</button>`;
            startAnim(q.visual);
        }
    }

    function checkAnswer(user) {
        if(user === quizzes[currentQuiz].ans) {
            alert("정답이다냥!");
            if(currentQuiz < 3) { currentQuiz++; render(); }
            else { document.getElementById('cert-popup').style.display = 'flex'; }
        } else { alert("오답이다냥! 다시 공부하고 오라냥!"); isQuiz=false; currentPage=1; render(); }
    }

    function showHint() { document.getElementById('hint-text').innerText = quizzes[currentQuiz].hint; document.getElementById('hint-modal').style.display = 'block'; }
    function goToCert() { 
        document.getElementById('cert-popup').style.display = 'none'; 
        document.getElementById('nav-cert').disabled = false; 
        showTab('cert'); 
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('nav-'+t).classList.add('active');
        if(t==='cert') {
            const now = new Date();
            document.getElementById('current-date').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 기준`;
        }
        if(t==='manual') render();
    }

    function stopAnim() { if(animId) cancelAnimationFrame(animId); if(restartTimeout) clearTimeout(restartTimeout); ctx.clearRect(0,0,canvas.width,canvas.height); }

    function startAnim(type) {
        let balls = []; const groundY = canvas.height - 35, midX = canvas.width/2;
        const setup = {
            mass_vacuum: () => [{x:midX*0.7,y:30,g:0.18,s:8,c:'#00f7ff'}, {x:midX*1.3,y:30,g:0.18,s:20,c:'#ff2ef7'}],
            dual_motion: () => [{x:35,y:35,vx:0,g:0.18,c:'#00f7ff'}, {x:35,y:35,vx:2.5,g:0.18,c:'#ff2ef7'}],
            velocity_dist: () => [{x:30,y:30,vx:1.2,g:0.18,c:'#00f7ff'}, {x:30,y:30,vx:3.5,g:0.18,c:'#ff2ef7'}],
            height_time: () => [{x:30,y:30,vx:2.2,g:0.18,c:'#ff2ef7'}, {x:30,y:120,vx:2.2,g:0.18,c:'#00f7ff'}],
            gravity_planet: () => [{x:midX*0.2,y:30,vx:2,g:0.08,c:'#00f7ff',l:'약함'}, {x:midX+20,y:30,vx:2,g:0.5,c:'#ff2ef7',l:'강함'}],
            quiz1: () => [{x:midX*0.2,y:30,g:0.14,c:'#00f7ff',l:'쇠구슬'}, {x:midX*0.35,y:30,g:0.04,c:'#fff200',l:'깃털'}, {x:midX*1.2,y:30,g:0.18,c:'#00f7ff',l:'쇠구슬'}, {x:midX*1.35,y:30,g:0.18,c:'#fff200',l:'깃털'}],
            quiz2: () => [{x:40,y:40,g:0.25,c:'#00f7ff',l:'A'}, {x:40,y:40,vx:4,g:0.25,c:'#ff2ef7',l:'B'}],
            quiz3: () => [{x:25,y:40,vx:3.5,g:0.2,c:'#00f7ff',l:'A'}, {x:25,y:130,vx:3.5,g:0.2,c:'#ff2ef7',l:'B'}, {x:25,y:40,vx:6.5,g:0.2,c:'#fff200',l:'C'}],
            quiz4: () => [{x:30,y:30,vx:0,g:0.4,c:'#00f7ff',l:'A(지구)'}, {x:30,y:30,vx:2.2,g:0.4,c:'#00f7ff',l:'B(지구)'}, {x:midX+30,y:30,vx:0,g:0.2,c:'#ff2ef7',l:'A(X)'}, {x:midX+30,y:30,vx:2.2,g:0.2,c:'#ff2ef7',l:'B(X)'}]
        };

        balls = setup[type]().map(b => ({...b, vy:0, h:[], landed:false}));
        let frame = 0, strobe = (type.includes('quiz')?14:8);
        const unit = (type==='quiz2'?40:(type==='quiz4'?35:30));

        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle="rgba(255,242,0,0.3)"; ctx.lineWidth=1.5;
            for(let i=0;i<canvas.width;i+=unit){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke();}
            for(let i=0;i<canvas.height;i+=unit){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(canvas.width,i);ctx.stroke();}
            if(type.includes('quiz') || type==='gravity_planet') { ctx.strokeStyle="rgba(255,255,255,0.2)"; ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(midX,0); ctx.lineTo(midX,groundY); ctx.stroke(); ctx.setLineDash([]); }
            if(type==='quiz1') { ctx.fillStyle="white"; ctx.font="bold 12px Jua"; ctx.textAlign="center"; ctx.fillText("(가) 공기 중", midX*0.3, groundY+25); ctx.fillText("(나) 진공 중", midX*1.3, groundY+25); }
            ctx.fillStyle="#1e293b"; ctx.fillRect(0, groundY, canvas.width, 35);
            
            let active = false; frame++;
            balls.forEach(b => {
                if(!b.landed) {
                    if(frame % strobe === 0) b.h.push({x:b.x, y:b.y});
                    b.vy += b.g; b.y += b.vy; if(b.vx) b.x += b.vx;
                    if(b.y >= groundY) { b.y = groundY; b.landed = true; }
                    active = true;
                }
                b.h.forEach((p, i) => {
                    ctx.globalAlpha = (i+1)/(b.h.length+3); ctx.fillStyle = b.c; ctx.beginPath(); ctx.arc(p.x, p.y, b.s||10, 0, 7); ctx.fill();
                });
                ctx.globalAlpha = 1; ctx.fillStyle = b.c; ctx.beginPath(); ctx.arc(b.x, b.y, b.s||10, 0, 7); ctx.fill();
                if(b.l) { ctx.fillStyle="white"; ctx.font="bold 11px Jua"; ctx.fillText(b.l, b.x, b.y-15); }
            });

            if(!active) { restartTimeout = setTimeout(()=>startAnim(type), 2200); return; }
            animId = requestAnimationFrame(loop);
        }
        loop();
    }
    window.onload = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; render(); };
</script>
</body>
</html>
